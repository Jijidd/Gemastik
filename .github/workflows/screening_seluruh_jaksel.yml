name: Screening Penuh Seluruh Ruas Jaksel

on:
  # Terjadwal HARIAN (bukan tiap 15/30 menit spt polling rutin dulu) --
  # skrip ini cuma perlu jalan sekali per hari utk memakai kuota harian,
  # akan otomatis berhenti sendiri kalau semua edge sudah selesai.
  schedule:
    - cron: '15 2 * * *'   # jam 02:15 UTC (~09:15 WIB) tiap hari

  workflow_dispatch: {}   # bisa juga dipicu manual kapan saja

concurrency:
  group: screening-seluruh-jaksel
  cancel-in-progress: false

permissions:
  contents: write   # perlu commit balik hasil CSV yg terus bertambah tiap run

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # ~2400 titik / 4 QPS ~ 10 menit, kasih buffer

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy pyproj

      - name: Jalankan screening (lanjut dari progres sebelumnya)
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python screening_seluruh_jaksel.py

      - name: Commit & push hasil screening terbaru
        run: |
          git config user.name "screening-bot"
          git config user.email "actions@users.noreply.github.com"
          git add screening_seluruh_jaksel.csv
          git diff --staged --quiet && echo "Tidak ada perubahan." || \
            (git commit -m "Screening Jaksel: lanjutan $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
