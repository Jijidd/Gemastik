name: Uji Coba Vector Flow Tiles (Skala Kecil)

on:
  # HANYA manual -- ini uji coba sekali jalan, BUKAN polling rutin, jadi
  # tidak perlu 'schedule' seperti workflow poll_tomtom.yml sebelumnya.
  workflow_dispatch: {}

permissions:
  contents: read   # cukup baca -- skrip ini tidak perlu commit apapun balik ke repo

jobs:
  uji-coba:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mapbox-vector-tile requests shapely pandas numpy pyproj

      - name: Jalankan uji coba, simpan output ke log file
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          PYTHONUNBUFFERED: "1"  # Memaksa Python agar tidak menahan log di memori
        # Tambahkan -u pada python dan 2>&1 sebelum pipe tee
        run: python -u uji_polling.py 2>&1 | tee hasil_uji_tile.log

      - name: Upload hasil sebagai artifact (bisa diunduh dari tab Actions)
        if: always()   # tetap upload log meski script error, utk debugging
        uses: actions/upload-artifact@v4
        with:
          name: hasil-uji-vector-tile
          path: hasil_uji_tile.log
          retention-days: 7
